<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>N0-thing (Y2K Glitch Kitten Rain)</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            /* 梦核感深邃渐变背景 */
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            overflow: hidden;
            cursor: default; 
            /* 防止移动端长按选中文本或出现菜单 */
            user-select: none;
            -webkit-user-select: none;
            touch-action: none; 
        }
        canvas {
            display: block;
        }

        /* 柔和的老式显像管扫描线 */
        .crt-scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none; 
            z-index: 10;
            background: repeating-linear-gradient(
                to bottom,
                rgba(255, 255, 255, 0) 0px,
                rgba(255, 255, 255, 0) 2px,
                rgba(0, 0, 0, 0.1) 2px,
                rgba(0, 0, 0, 0.1) 4px
            );
        }
    </style>
</head>
<body>
    <div class="crt-scanlines"></div>
    <canvas id="matrixCanvas"></canvas>

    <script>
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const matrixChars = 'N0|thing nothing&0 ∞⊙v ♡ ☆ ねこ';
        const charArray = matrixChars.split('');

        const fontSize = 16;
        let columns = Math.floor(canvas.width / fontSize);

        let drops = [];
        function initDrops() {
            drops = [];
            columns = Math.floor(canvas.width / fontSize);
            for (let x = 0; x < columns; x++) {
                drops[x] = {
                    y: Math.random() * canvas.height / fontSize,
                    stackUntil: 0,
                    stackBaseY: 0,
                    stackedChars: [],
                    charIndex: Math.floor(Math.random() * charArray.length) 
                };
            }
        }
        initDrops();

        const cats = [];
        let mouseX = -1000;
        let mouseY = -1000;

        // --- 鼠标交互事件 ---
        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        window.addEventListener('mouseout', () => {
            mouseX = -1000;
            mouseY = -1000;
        });

        // --- 移动端触屏交互事件 (新增适配) ---
        window.addEventListener('touchmove', (e) => {
            e.preventDefault(); // 防止屏幕滚动
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        }, { passive: false });

        window.addEventListener('touchend', () => {
            mouseX = -1000;
            mouseY = -1000;
        });
        
        window.addEventListener('touchcancel', () => {
            mouseX = -1000;
            mouseY = -1000;
        });

        // 声音播放
        function playKittenEcho() {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel(); 

            const speak = (vol, rateMultiplier) => {
                const utterance = new SpeechSynthesisUtterance("nothing");
                utterance.pitch = 2.0; 
                utterance.rate = 1.5 * rateMultiplier;  
                utterance.volume = vol;
                window.speechSynthesis.speak(utterance);
            };

            speak(1.0, 1.0); 
            setTimeout(() => speak(0.4, 0.95), 20); 
            setTimeout(() => speak(0.15, 0.9), 50); 
            setTimeout(() => speak(0.05, 0.8), 90); 
            setTimeout(() => speak(0.01, 0.6), 140); 
        }

        function drawCatHead(ctx, x, y, alpha) {
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.translate(x, y);
            
            const rippleScale = 0.5 + (1.0 - alpha) * 0.8; 
            ctx.scale(rippleScale, rippleScale);
            
            ctx.lineWidth = 2;
            ctx.lineJoin = 'round'; 
            ctx.lineCap = 'round';
            
            const catFillColor = '#1a1835';
            
            ctx.fillStyle = catFillColor;
            ctx.strokeStyle = '#FFF';
            ctx.beginPath();
            ctx.moveTo(-36, -20); 
            ctx.arcTo(-24, -50, -8, -36, 6); 
            ctx.lineTo(-8, -36); 
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(36, -20); 
            ctx.arcTo(24, -50, 8, -36, 6); 
            ctx.lineTo(8, -36); 
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = catFillColor;
            ctx.strokeStyle = '#FFF';
            ctx.beginPath();
            ctx.ellipse(0, 0, 42, 38, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            ctx.strokeStyle = '#FFF';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.roundRect(-30, -10, 26, 22, 5); 
            ctx.roundRect(4, -10, 26, 22, 5);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(-4, 1);
            ctx.lineTo(4, 1);
            ctx.stroke();

            ctx.restore();
        }

        // 统一处理点击和触屏开始事件
        function handleInteraction(x, y) {
            const col = Math.floor(x / fontSize);
            const row = Math.floor(y / fontSize);
            const now = Date.now();
            
            if (drops[col]) {
                drops[col].stackUntil = now + 2000; 
                drops[col].stackBaseY = row;
                drops[col].stackedChars = []; 
                drops[col].y = 0; 
            }

            cats.push({
                x: x,
                y: y,
                alpha: 1.0 
            });

            playKittenEcho();
        }

        window.addEventListener('click', (e) => {
            handleInteraction(e.clientX, e.clientY);
        });

        window.addEventListener('touchstart', (e) => {
            e.preventDefault(); // 阻止默认的触屏点击事件，避免与click重复触发
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
            handleInteraction(touch.clientX, touch.clientY);
        }, { passive: false });

        function draw() {
            ctx.shadowBlur = 0;
            ctx.fillStyle = 'rgba(15, 12, 41, 0.08)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const now = Date.now();

            for (let i = 0; i < drops.length; i++) {
                let drop = drops[i];
                
                let baseChar = charArray[drop.charIndex];
                drop.charIndex = (drop.charIndex + 1) % charArray.length;

                const charX = i * fontSize;
                const charY = drop.y * fontSize;
                
                const distToMouse = Math.hypot(charX - mouseX, charY - mouseY);
                
                let charToDraw = baseChar;
                
                if (distToMouse < fontSize * 5) {
                    charToDraw = "0";
                    ctx.fillStyle = '#00FFFF'; 
                    ctx.font = `bold ${fontSize * 1.5}px monospace`;
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = '#00FFFF';
                } else {
                    ctx.fillStyle = '#E6E6FA'; 
                    ctx.font = `${fontSize}px monospace`;
                    ctx.shadowBlur = 0;
                }

                if (now < drop.stackUntil) {
                    let topOfStack = drop.stackBaseY - drop.stackedChars.length;
                    
                    if (drop.y >= topOfStack) {
                        drop.stackedChars.push({
                            y: topOfStack,
                            char: charToDraw,
                            isBig: (charToDraw === "0") 
                        });
                        drop.y = 0; 
                    } else {
                        drop.y++;
                        ctx.fillText(charToDraw, charX, drop.y * fontSize);
                    }
                } else {
                    drop.stackedChars = [];
                    drop.y++;
                    
                    if (drop.y * fontSize > canvas.height && Math.random() > 0.975) {
                        drop.y = 0;
                    }
                    ctx.fillText(charToDraw, charX, drop.y * fontSize);
                }
            }

            ctx.shadowBlur = 0;
            for (let i = 0; i < drops.length; i++) {
                let drop = drops[i];
                for (let j = 0; j < drop.stackedChars.length; j++) {
                    let sChar = drop.stackedChars[j];
                    if (sChar.isBig) {
                        ctx.fillStyle = '#00FFFF';
                        ctx.font = `bold ${fontSize * 1.5}px monospace`;
                    } else {
                        ctx.fillStyle = '#E6E6FA';
                        ctx.font = `${fontSize}px monospace`;
                    }
                    ctx.fillText(sChar.char, i * fontSize, sChar.y * fontSize);
                }
            }

            ctx.shadowBlur = 0;
            ctx.font = `${fontSize}px monospace`;

            for (let i = cats.length - 1; i >= 0; i--) {
                const cat = cats[i];
                drawCatHead(ctx, cat.x, cat.y, cat.alpha);
                
                cat.alpha -= 0.0166;
                
                if (cat.alpha <= 0) {
                    cats.splice(i, 1);
                }
            }
        }

        setInterval(draw, 33);

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initDrops(); // 手机横竖屏切换时重新初始化列数
        });
    </script>
</body>
</html>
import type { AppProps } from 'next/app';
import { SpeedInsights } from '@vercel/speed-insights/next';
 
function MyApp({ Component, pageProps }: AppProps) {
  return (
    <>
      <Component {...pageProps} />
      <SpeedInsights />
    </>
  );
}
 
export default MyApp;
import { SpeedInsights } from "@vercel/speed-insights/next"
